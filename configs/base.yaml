# ╔══════════════════════════════════════════════════════╗
# ║      Dual ResNet -- Base Configuration               ║
# ╚══════════════════════════════════════════════════════╝
# All other configs inherit / override from this file.

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  pre_event_dir:  "<PATH>/pre-event"
  post_event_dir: "<PATH>/post-event"
  target_dir:     "<PATH>/target"
  split_dir:      "<PATH>/standard_ML"
  train_split:    "train_set.txt"
  val_split:      "val_set.txt"
  test_split:     "test_set.txt"
  image_size: 512
  num_classes: 4
  class_names:
    - Background
    - Intact
    - Damaged
    - Destroyed
  class_abbrev:
    - BG
    - INT
    - DAM
    - DES
  # Pixel distribution (from full dataset scan)
  class_distribution:
    Background : 85.3
    Intact     : 11.8
    Damaged    :  1.5
    Destroyed  :  1.4

# ── DataLoader ────────────────────────────────────────────────────────────────
loader:
  batch_size: 16
  num_workers: 0          # set >0 on Linux; keep 0 on Windows
  pin_memory: true
  drop_last: true         # avoids BatchNorm instability on batch_size=1

# ── Augmentation ─────────────────────────────────────────────────────────────
augmentation:
  resize: 512
  normalize:
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  name: ExactDualStreamNetwork
  encoder: resnet50                    # backbone for both streams
  encoder_weights: IMAGENET1K_V1
  decoder: deeplabv3                   # ASPP-based decoder
  decoder_weights: COCO_WITH_VOC_LABELS_V1
  fusion: best_fusion_selector         # concat | subtract | attention -> selector
  fusion_channels: 2048
  num_classes: 4
  total_params: 255_047_658

# ── Optimisation ─────────────────────────────────────────────────────────────
train:
  epochs: 40
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  scheduler: cosine                    # CosineAnnealingLR
  cosine_T_max: 40
  seed: 42

# ── Loss ─────────────────────────────────────────────────────────────────────
loss:
  type: focal                          # Focal Loss
  focal_gamma: 2.5
  class_weight_method: effective_num   # beta-based effective number weighting
  beta: 0.9999
  manual_boosts:
    Damaged:   2.0                     # most under-represented fine-grained class
    Destroyed: 1.5
  weight_clamp_min: 0.1
  weight_clamp_max: 20.0
  weight_batches: 25                   # batches used to estimate class counts

# ── Evaluation Metrics ────────────────────────────────────────────────────────
metrics:
  per_class:
    - IoU
    - Precision
    - Recall
    - F1
    - TP
    - FP
    - FN
    - TN
    - Support
  aggregate:
    - mIoU
    - overall_accuracy
    - macro_precision
    - macro_recall
    - macro_f1
    - weighted_precision
    - weighted_recall
    - weighted_f1

# ── Checkpointing ─────────────────────────────────────────────────────────────
checkpoint:
  save_dir: "./checkpoints"
  best: "best_model.pth"
  last: "last_model.pth"
  monitor: mIoU                        # metric to track for best checkpoint
  mode: max

# ── Output ────────────────────────────────────────────────────────────────────
output:
  root_dir: "./runs_dual_resnet"
  log_interval: 1                      # print metrics every N epochs
